<script>
const CONFIG = {
    host:   'kitapi-us.voximplant.com',
    domain: 'docegasmax',
    token:  '32425f0118dd316f9c40d5022c5118604f56d82bc96bca464fb1e611569e9e63'
};

const phoneInput = document.getElementById('phoneInput');
const searchBtn  = document.getElementById('searchBtn');
const stateEmpty = document.getElementById('stateEmpty');
const stateLoad  = document.getElementById('stateLoading');
const stateError = document.getElementById('stateError');
const callList   = document.getElementById('callList');

function getPhoneFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('phone');
}

window.addEventListener('DOMContentLoaded', function() {
    const phoneFromURL = getPhoneFromURL();
    if (phoneFromURL) {
        phoneInput.value = phoneFromURL;
        doSearch();
    } else {
        showState('empty');
    }
});

searchBtn.addEventListener('click', doSearch);
phoneInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
});

async function doSearch() {
    const phone = phoneInput.value.trim();
    if (!phone) return;

    showState('loading');
    searchBtn.disabled = true;

    try {
        const url = 'https://' + CONFIG.host + '/api/v4/history/searchCalls?domain=' + CONFIG.domain;

        const params = new URLSearchParams({
            access_token: CONFIG.token,
            phone: phone,
            call_direction: 'incoming',   // ✅ inbound
            limit: 5,                     // ✅ últimas 5
            with_campaigns: 'true',
            with_tags: 'true',
            with_wrap_up_code: 'true',
            with_agent_campaign: 'true',
            with_topics: 'true',
            with_comments: 'true'
        });

        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.success) throw new Error('API success=false');

        renderCalls(data.result || []);

    } catch (err) {
        console.error(err);
        showState('error', err.message);
    } finally {
        searchBtn.disabled = false;
    }
}

function renderCalls(calls) {
    if (!calls.length) {
        showState('empty', 'No se encontraron llamadas entrantes');
        return;
    }

    showState('results');

    let html = '';
    for (let i = 0; i < calls.length; i++) {
        html += buildCard(calls[i]);
    }
    callList.innerHTML = html;
}

function buildCard(c) {

    const phoneA = (c.phone_a || '').replace(/@\S+/g, ''); // ✅ caller inbound
    const durStr = fmtSec(c.duration || 0);

    const cc = c.completion_code || '—';
    const ccColor = cc.includes('Answered') ? '#28a745'
        : (cc.includes('Missed') || cc.includes('Busy')) ? '#dc3545'
        : '#856404';

    return `
    <div class="call-card">
        <div class="card-header">
            <div class="phone-row">
                <span class="dir-badge">Entrante</span>
                <span class="phone-num">📞 ${esc(phoneA)}</span>
            </div>
            <div class="header-right">
                <span class="call-date">${fmtDate(c.datetime_start)}</span>
                <span class="call-duration">${durStr}</span>
            </div>
        </div>
    </div>`;
}

function showState(which, msg) {
    stateEmpty.classList.remove('visible');
    stateLoad.classList.remove('visible');
    stateError.classList.remove('visible');
    callList.innerHTML = '';

    if (which === 'loading') {
        stateLoad.classList.add('visible');
    } else if (which === 'error') {
        document.getElementById('errorMsg').textContent = msg || 'Error';
        stateError.classList.add('visible');
    } else if (which === 'empty') {
        document.querySelector('#stateEmpty .state-text').textContent =
            msg || 'Ingresa un número';
        stateEmpty.classList.add('visible');
    }
}

function fmtDate(str) {
    if (!str) return 'N/A';
    const d = new Date(str.replace(' ', 'T'));
    return d.toLocaleString();
}

function fmtSec(s) {
    s = parseInt(s) || 0;
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60), r = s % 60;
    return r ? (m + 'm ' + r + 's') : (m + 'm');
}

function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
