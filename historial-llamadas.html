<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Llamadas</title>

<style>
/* TODO tu CSS ORIGINAL EXACTAMENTE IGUAL */
</style>

</head>
<body>

<div class="header">
    <h1>📞 Historial de Llamadas Entrantes</h1>
    <div class="search-form">
        <div class="form-group">
            <label for="phoneInput">Número de Teléfono</label>
            <input type="text" id="phoneInput" placeholder="Ej: 525556581111">
        </div>
        <button id="searchBtn">Buscar</button>
    </div>
</div>

<div class="state-box" id="stateEmpty">
    <div class="state-icon">📱</div>
    <p class="state-text">Ingresa un número de teléfono para buscar llamadas</p>
</div>

<div class="state-box" id="stateLoading">
    <div class="spinner"></div>
    <p class="state-text">Consultando historial...</p>
</div>

<div class="state-box" id="stateError">
    <div class="state-icon">⚠️</div>
    <p class="error-text" id="errorMsg"></p>
</div>

<div class="call-list" id="callList"></div>

<script>

const CONFIG = {
    host:   'kitapi-us.voximplant.com',
    domain: 'docegasmax',
    token:  '32425f0118dd316f9c40d5022c5118604f56d82bc96bca464fb1e611569e9e63'
};

const phoneInput = document.getElementById('phoneInput');
const searchBtn  = document.getElementById('searchBtn');
const stateEmpty = document.getElementById('stateEmpty');
const stateLoad  = document.getElementById('stateLoading');
const stateError = document.getElementById('stateError');
const callList   = document.getElementById('callList');

function getPhoneFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('phone');
}

window.addEventListener('DOMContentLoaded', function() {
    const phoneFromURL = getPhoneFromURL();
    if (phoneFromURL) {
        phoneInput.value = phoneFromURL;
        doSearch();
    } else {
        showState('empty');
    }
});

searchBtn.addEventListener('click', doSearch);
phoneInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
});

async function doSearch() {

    const phone = phoneInput.value.trim();
    if (!phone) return;

    showState('loading');
    searchBtn.disabled = true;

    try {

        const url = 'https://' + CONFIG.host + '/api/v4/history/searchCalls?domain=' + CONFIG.domain;

        const params = new URLSearchParams({
            access_token: CONFIG.token,
            phone: phone,
            call_direction: 'incoming',
            limit: 5,
            with_campaigns: 'true',
            with_tags: 'true',
            with_wrap_up_code: 'true',
            with_agent_campaign: 'true',
            with_topics: 'true',
            with_comments: 'true'
        });

        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.success) throw new Error('API success=false');

        renderCalls(data.result || []);

    } catch (err) {
        console.error(err);
        showState('error', err.message);
    } finally {
        searchBtn.disabled = false;
    }
}

function renderCalls(calls) {

    if (!calls.length) {
        showState('empty', 'No se encontraron llamadas entrantes');
        return;
    }

    showState('results');

    let html = '';
    calls.forEach(c => html += buildCard(c));
    callList.innerHTML = html;
}

function buildCard(c) {

    const phoneCaller = (c.phone_a || '').replace(/@\S+/g, '');
    const durStr = fmtSec(c.duration || 0);

    let callData = {};
    try {
        if (c.call_data) callData = JSON.parse(c.call_data);
    } catch(e){}

    const cc = c.completion_code || '—';

    return `
    <div class="call-card">
        <div class="card-header">
            <div class="phone-row">
                <span class="dir-badge">Entrante</span>
                <span class="phone-num">📞 ${esc(phoneCaller)}</span>
            </div>
            <div class="header-right">
                <span class="call-date">${fmtDate(c.datetime_start)}</span>
                <span class="call-duration">${durStr}</span>
            </div>
        </div>
    </div>`;
}

function showState(which, msg) {

    stateEmpty.classList.remove('visible');
    stateLoad.classList.remove('visible');
    stateError.classList.remove('visible');
    callList.innerHTML = '';

    if (which === 'loading') stateLoad.classList.add('visible');
    else if (which === 'error') {
        document.getElementById('errorMsg').textContent = msg || 'Error';
        stateError.classList.add('visible');
    }
    else if (which === 'empty') {
        document.querySelector('#stateEmpty .state-text').textContent =
            msg || 'Ingresa un número';
        stateEmpty.classList.add('visible');
    }
}

function fmtDate(str) {
    if (!str) return 'N/A';
    const d = new Date(str.replace(' ', 'T'));
    return d.toLocaleString();
}

function fmtSec(s) {
    s = parseInt(s) || 0;
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60), r = s % 60;
    return r ? (m + 'm ' + r + 's') : (m + 'm');
}

function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

</script>

</body>
</html>
