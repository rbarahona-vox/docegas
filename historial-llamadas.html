<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial IVR</title>

<style>
/* 👉 TU CSS ORIGINAL COMPLETO AQUÍ (NO LO CAMBIO) */
</style>

</head>
<body>

<div class="header">
    <h1 id="title">Cargando historial....</h1>
</div>

<div class="state-box visible" id="stateLoading">
    <div class="spinner"></div>
    <p class="state-text">Consultando historial...</p>
</div>

<div class="state-box" id="stateError">
    <div class="state-icon">⚠️</div>
    <p class="error-text" id="errorMsg"></p>
</div>

<div class="call-list" id="callList"></div>

<script>

function showDebug(){

    const container = document.body;

    const box = document.createElement("div");
    box.style.padding = "20px";
    box.style.fontFamily = "monospace";
    box.style.background = "#111";
    box.style.color = "#0f0";
    box.style.fontSize = "12px";

    box.innerHTML = "<h2>DEBUG IVR VARIABLES</h2>";

    // URL completa
    box.innerHTML += "<b>Full URL:</b><br>" + window.location.href + "<br><br>";

    // Query params
    box.innerHTML += "<b>Query Params:</b><br>";
    const params = new URLSearchParams(window.location.search);

    if([...params].length === 0){
        box.innerHTML += "NO QUERY PARAMS<br>";
    }else{
        params.forEach((v,k)=>{
            box.innerHTML += k + " = " + v + "<br>";
        });
    }

    // Hash
    box.innerHTML += "<br><b>Hash:</b><br>" + window.location.hash + "<br>";

    // Referrer
    box.innerHTML += "<br><b>Referrer:</b><br>" + document.referrer + "<br>";

    // Navigator
    box.innerHTML += "<br><b>UserAgent:</b><br>" + navigator.userAgent + "<br>";

    document.body.appendChild(box);
}

showDebug();

</script>

</body>
</html>
